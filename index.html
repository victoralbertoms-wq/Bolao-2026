  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f3f4f6;color:#111;min-height:100vh}
    input,select,button{font-family:inherit;font-size:14px}
    input,select{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111;margin-bottom:8px}
    button{cursor:pointer;border:none;border-radius:8px;padding:8px 18px;font-weight:500}
    .btn-p{background:#1a5c2e;color:#fff}.btn-p:hover{background:#145223}
    .btn-s{background:#e5e7eb;color:#111}.btn-s:hover{background:#d1d5db}
    .card{background:#fff;border-radius:12px;padding:1.25rem;border:1px solid #e5e7eb}
    .toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:10px;color:#fff;font-weight:500;font-size:14px;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.15)}
    nav{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:4px}
    .nav-btn{background:transparent;border:none;padding:6px 10px;font-size:13px;color:#555;border-radius:8px}
    .nav-btn.active{background:#f3f4f6;color:#111;font-weight:500}
    main{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
    .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.5rem}
    .stat-box{background:#f0fdf4;border-radius:10px;padding:1rem;text-align:center}
    .stat-box .val{font-size:26px;font-weight:500}.stat-box .lbl{font-size:12px;color:#555;margin-top:4px}
    .tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500}
    .tag-green{background:#dcfce7;color:#166534}.tag-blue{background:#dbeafe;color:#1d4ed8}
    .tag-orange{background:#ffedd5;color:#c2410c}.tag-gray{background:#f3f4f6;color:#555}
    .rank-row{display:grid;grid-template-columns:36px 1fr 54px 54px 54px;gap:6px;align-items:center;padding:8px 10px;border-radius:8px;margin-bottom:2px}
    .grupo-btn{padding:4px 10px;border-radius:8px;font-size:12px;border:none;cursor:pointer;margin-bottom:4px}
    .jogo-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1rem;margin-bottom:10px}
    .jogo-times{display:flex;align-items:center;gap:8px;justify-content:center;margin:.75rem 0}
    .gol-input{width:52px;text-align:center;font-size:20px;font-weight:500;padding:4px;border-radius:8px;border:1px solid #d1d5db;margin-bottom:0}
    .av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:500;color:#fff;flex-shrink:0}
    #loading{position:fixed;inset:0;background:#f3f4f6;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:9999}
    .spinner{width:36px;height:36px;border:3px solid #d1d5db;border-top-color:#1a5c2e;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .import-box{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:1rem;margin-bottom:1rem}
    .mono{font-family:monospace;font-size:12px;background:#f3f4f6;padding:8px 10px;border-radius:8px;color:#555;margin-bottom:10px;white-space:pre}
  </style>
</head>

function calcPts(pal,jogo){
  if(jogo.gols1===null||jogo.gols1===undefined||!pal) return null;
  if(pal.gols1===jogo.gols1&&pal.gols2===jogo.gols2) return 3;
  const vR=jogo.gols1>jogo.gols2?"1":jogo.gols1<jogo.gols2?"2":"e";
  const vP=pal.gols1>pal.gols2?"1":pal.gols1<pal.gols2?"2":"e";
  return vR===vP?1:0;
}
function avatarBg(n){
  const cols=["#1a5c2e","#1565c0","#6a1b9a","#ad1457","#e65100","#00695c","#4527a0"];
  let h=0; for(let i=0;i<(n||"").length;i++) h=(n||"").charCodeAt(i)+((h<<5)-h);
  return cols[Math.abs(h)%cols.length];
}
function avHtml(nome,size,fs){
  const bg=avatarBg(nome||"?");
  const ini=(nome||"?").split(" ").map(p=>p[0]).join("").toUpperCase().slice(0,2);
  return `<div class="av" style="width:${size}px;height:${size}px;background:${bg};font-size:${fs}px">${ini}</div>`;
}

async function fbGet(path){const snap=await get(ref(db,path));return snap.exists()?snap.val():null;}
async function fbSet(path,val){await set(ref(db,path),val);}
async function fbUpd(path,val){await update(ref(db,path),val);}

async function init(){
  try{
    let jogos=await fbGet("jogos");
    if(!jogos){
      jogos={};
      JOGOS_BASE.forEach(j=>{jogos[j.id]=j;});
      await fbSet("jogos",jogos);
    }
    S.jogos=jogos;
    S.usuarios=await fbGet("usuarios")||{};
    if(!Object.values(S.usuarios).find(u=>u.username==="admin")){
      await fbSet("usuarios/admin",{id:"admin",nome:"Admin",username:"admin",senha:"admin123",isAdmin:true});
      S.usuarios["admin"]={id:"admin",nome:"Admin",username:"admin",senha:"admin123",isAdmin:true};
    }
    S.palpites=await fbGet("palpites")||{};
    const sess=localStorage.getItem("bolao_user");
    if(sess&&S.usuarios[sess]) S.usuario=S.usuarios[sess];
    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
    render();
    onValue(ref(db,"jogos"),snap=>{if(snap.exists()){S.jogos=snap.val();render();}});
    onValue(ref(db,"palpites"),snap=>{if(snap.exists()){S.palpites=snap.val();render();}});
    onValue(ref(db,"usuarios"),snap=>{if(snap.exists()){S.usuarios=snap.val();render();}});
  }catch(err){
    document.getElementById("loading").innerHTML=`<p style="color:#dc2626;font-size:14px">Erro ao conectar: ${err.message}</p>`;
  }
}

function toast(msg,tipo){
  const el=document.getElementById("toast");if(!el)return;
  el.textContent=msg;el.style.background=tipo==="err"?"#c62828":"#1a5c2e";el.style.display="block";
  clearTimeout(window._tt);window._tt=setTimeout(()=>el.style.display="none",3000);
}

function usuariosArr(){return Object.values(S.usuarios);}

function getRanking(){
  return usuariosArr().map(u=>{
    const meus=S.palpites[u.id]||{};
    let total=0,acertos=0,exatos=0;
    jogosArr().forEach(j=>{
      if(j.gols1===null||j.gols1===undefined) return;
      const p=meus[j.id];if(!p) return;
      const pts=calcPts(p,j);
      if(pts>0){total+=pts;acertos++;}if(pts===3)exatos++;
    });
    return {...u,total,acertos,exatos};
  }).sort((a,b)=>b.total-a.total||b.acertos-a.acertos||a.nome.localeCompare(b.nome));
}

            <span style="margin-left:auto;font-size:11px;color:#555">${j.data}</span>
          </div>`).join("")}`;
    } else if(adminAba==="importar"){
      abaContent=`
        <h3 style="font-size:15px;font-weight:500;margin:0 0 8px">📥 Importar palpites em massa</h3>
        <p style="font-size:13px;color:#555;margin-bottom:12px">
          Selecione o arquivo <strong>.xlsx</strong> com as abas de cada participante.<br>
          O sistema cria os usuários automaticamente com senha padrão <strong>copa2026</strong>.<br>
          <strong style="color:#c2410c">⚠️ Palpites importados ficam bloqueados — não podem ser editados.</strong>
        </p>
        <input type="file" accept=".xlsx,.xls" onchange="importarPlanilhaMassa(event)" style="width:auto;margin-bottom:8px"/>
        <div id="import-massa-msg" style="font-size:13px;margin-top:8px"></div>
        <div id="import-massa-preview" style="margin-top:12px"></div>`;
    } else {
      abaContent=`
        <h3 style="font-size:15px;font-weight:500;margin:0 0 10px">Participantes (${usuariosArr().length})</h3>
        ${ranking.map((u,i)=>`
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #e5e7eb">
            <span style="font-size:14px;width:24px;text-align:center">${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</span>
            ${avHtml(u.nome,28,11)}
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500">${u.nome} ${u.isAdmin?tag("Admin","blue"):""}</div>
              <div style="font-size:11px;color:#555">@${u.username}</div>
            </div>
            <div style="text-align:right;font-size:13px">
              <div style="font-weight:500">${u.total} pts</div>
              <div style="font-size:11px;color:#555">${u.acertos} acertos</div>
            </div>
            ${!u.isAdmin?`<button onclick="excluirUsuario('${u.id}','${u.nome}')" style="background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;flex-shrink:0">🗑️</button>`:""}
          </div>`).join("")}`;
    }
    content=`
    <h2 style="font-size:18px;font-weight:500;margin:0 0 1rem">⚙️ Painel administrativo</h2>
    <div style="display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap">${abaBtns}</div>
    <div class="card">${abaContent}</div>`;
  }

  app.innerHTML=`
  <nav>
    <div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="ir('dashboard')">
      <span style="font-weight:500;font-size:15px"><span style="color:#1a5c2e">Bolão</span> Copa 2026 🏆</span>
    </div>
    <div style="display:flex;align-items:center;gap:2px;flex-wrap:wrap">${navBtns}
      <div style="width:1px;height:20px;background:#e5e7eb;margin:0 4px"></div>
      ${avHtml(usuario.nome,28,11)}
      <button class="nav-btn" onclick="doLogout()" style="color:#dc2626">Sair</button>
    </div>
  </nav>
  <main>${content}</main>
  <div id="toast" class="toast" style="display:none"></div>`;
}

// ── AÇÕES ──
window.setAba=a=>{S.aba=a;render();};
window.ir=p=>{S.pagina=p;render();};
window.setGrupo=g=>{S.grupoAtivo=g;render();};
window.setAdminAba=a=>{S.adminAba=a;render();};
window.toggleImport=()=>{S.importAberto=!S.importAberto;render();};

window.doLogin=async()=>{
  const user=document.getElementById("l-user")?.value.trim();
  const senha=document.getElementById("l-senha")?.value;
  const u=Object.values(S.usuarios).find(x=>x.username===user&&x.senha===senha);
  if(!u){const el=document.getElementById("login-erro");el.style.display="block";el.textContent="Usuário ou senha incorretos.";return;}
  S.usuario=u;localStorage.setItem("bolao_user",u.id);S.pagina="dashboard";render();
};

window.doCadastro=async()=>{
  const nome=document.getElementById("c-nome")?.value.trim();
  const user=document.getElementById("c-user")?.value.trim().toLowerCase().replace(/\s/g,"_");
  const senha=document.getElementById("c-senha")?.value;
  const senha2=document.getElementById("c-senha2")?.value;
  const el=document.getElementById("login-erro");
  if(!nome||!user||!senha){el.style.display="block";el.textContent="Preencha todos os campos.";return;}
  if(senha!==senha2){el.style.display="block";el.textContent="As senhas não coincidem.";return;}
  if(senha.length<4){el.style.display="block";el.textContent="Senha deve ter ao menos 4 caracteres.";return;}
  if(Object.values(S.usuarios).find(x=>x.username===user)){el.style.display="block";el.textContent="Nome de usuário já existe.";return;}
  const id="u_"+Date.now();
  const novo={id,nome,username:user,senha,isAdmin:false};
  await fbSet("usuarios/"+id,novo);
  S.usuario=novo;localStorage.setItem("bolao_user",id);S.pagina="dashboard";render();
};

window.doLogout=()=>{S.usuario=null;localStorage.removeItem("bolao_user");S.pagina="login";render();};

window.setPalTemp=(jId,campo,val)=>{
  if(!S.palTemp[jId]) S.palTemp[jId]={};
  S.palTemp[jId][campo]=parseInt(val)||0;
};

window.salvarPalpite=async(jId)=>{
  const tmp=S.palTemp[jId];
  if(!tmp||tmp.gols1===undefined||tmp.gols2===undefined){toast("Preencha o placar!","err");return;}
  const uid=S.usuario.id;
  await fbSet(`palpites/${uid}/${jId}`,{gols1:tmp.gols1,gols2:tmp.gols2,bloqueado:false});
  if(!S.palpites[uid]) S.palpites[uid]={};
  S.palpites[uid][jId]={gols1:tmp.gols1,gols2:tmp.gols2,bloqueado:false};
  toast("Palpite salvo!");render();
};

window.lancarResultado=async()=>{
  const jId=parseInt(document.getElementById("adm-jogo")?.value);
  const g1=parseInt(document.getElementById("adm-g1")?.value);
  const g2=parseInt(document.getElementById("adm-g2")?.value);
  if(!jId||isNaN(g1)||isNaN(g2)){toast("Selecione um jogo e preencha o placar.","err");return;}
  await fbUpd(`jogos/${jId}`,{gols1:g1,gols2:g2,status:"encerrado"});
  toast("Resultado lançado!");
};

window.salvarPerfil=async()=>{
  const nome=document.getElementById("p-nome")?.value.trim();
  const senha=document.getElementById("p-senha")?.value;
  if(!nome){toast("Nome não pode estar vazio.","err");return;}
  const upd={nome};
  if(senha){if(senha.length<4){toast("Senha muito curta.","err");return;}upd.senha=senha;}
  await fbUpd(`usuarios/${S.usuario.id}`,upd);
  S.usuario={...S.usuario,...upd};toast("Perfil atualizado!");render();
};

window.importarCSV=async(e)=>{
  const msg=document.getElementById("import-msg");if(msg) msg.textContent="";
  const file=e.target.files[0];if(!file) return;
  const ext=file.name.split(".").pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      let linhas=[];
      if(ext==="xlsx"||ext==="xls"){
        const data=new Uint8Array(ev.target.result);
        const wb=XLSX.read(data,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        linhas=XLSX.utils.sheet_to_json(ws,{header:1,defval:""}).map(r=>r.map(c=>String(c).trim()));
      } else {
        linhas=ev.target.result.trim().split(/\r?\n/).map(l=>l.split(/[;,]/));
      }
      if(linhas.length<2){if(msg)msg.innerHTML='<span style="color:#dc2626">⚠️ Arquivo vazio.</span>';return;}
      const hdr=linhas[0].map(h=>String(h).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\r/g,""));
      const iId=hdr.findIndex(h=>h==="n"||h==="no"||h==="n."||h==="nº"||h==="num"||h.startsWith("n")&&h.length<=3||h.includes("jogo")||h==="id");
      const iG1=hdr.findIndex(h=>h==="gols 1"||h==="gols1"||(h.includes("gol")&&h.includes("1")));
      const iG2=hdr.findIndex(h=>h==="gols 2"||h==="gols2"||(h.includes("gol")&&h.includes("2")));
      if(iId<0||iG1<0||iG2<0){if(msg)msg.innerHTML='<span style="color:#dc2626">⚠️ Colunas não encontradas. Use o modelo.</span>';return;}
      let ok=0,skip=0;
      const updates={};
      const uid=S.usuario.id;
      jogosArr().forEach(j=>{
        const row=linhas.slice(1).find(cols=>parseInt(cols[iId])===j.id);
        if(!row){skip++;return;}
        const g1=String(row[iG1]||"").trim();
        const g2=String(row[iG2]||"").trim();
        if(g1===""||g2===""){skip++;return;}
        if(j.status==="encerrado"){skip++;return;}
        updates[`palpites/${uid}/${j.id}`]={gols1:parseInt(g1)||0,gols2:parseInt(g2)||0,bloqueado:false};
        ok++;
      });
      if(ok>0) await update(ref(db),updates);
      if(msg) msg.innerHTML=`<span style="color:#166534;font-weight:500">✅ ${ok} palpite(s) importado(s).${skip>0?" "+skip+" ignorado(s).":""}</span>`;
      e.target.value="";
    }catch(err){if(msg)msg.innerHTML=`<span style="color:#dc2626">⚠️ Erro: ${err.message}</span>`;}
  };
  if(ext==="xlsx"||ext==="xls") reader.readAsArrayBuffer(file);
  else reader.readAsText(file,"UTF-8");
};

window.importarPlanilhaMassa=async(e)=>{
  const msg=document.getElementById("import-massa-msg");
  const preview=document.getElementById("import-massa-preview");
  if(msg) msg.innerHTML='<span style="color:#555">⏳ Lendo arquivo...</span>';
  if(preview) preview.innerHTML="";
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:"array"});
      const abasIgnorar=["jogos","games","partidas","copa","sheet1","planilha1","fase de grupos","instrucoes","instruções"];
      const abas=wb.SheetNames.filter(n=>!abasIgnorar.includes(n.toLowerCase().trim()));
      if(abas.length===0){if(msg)msg.innerHTML='<span style="color:#dc2626">⚠️ Nenhuma aba de participante encontrada.</span>';return;}
      const resultados=[];
      const todos=jogosArr();
      abas.forEach(nomeAba=>{
        const ws=wb.Sheets[nomeAba];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        if(rows.length<2){resultados.push({nome:nomeAba,ok:0,skip:0,erro:"Aba vazia"});return;}
        const hdr=rows[0].map(h=>String(h).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""));
        const iId=hdr.findIndex(h=>h==="n"||h==="no"||h==="n."||h==="nº"||h==="num"||h.startsWith("n")&&h.length<=3);
        const iG1=hdr.findIndex(h=>h==="gols 1"||h==="gols1"||(h.includes("gol")&&h.includes("1")));
        const iG2=hdr.findIndex(h=>h==="gols 2"||h==="gols2"||(h.includes("gol")&&h.includes("2")));
        if(iId<0||iG1<0||iG2<0){resultados.push({nome:nomeAba,ok:0,skip:0,erro:"Colunas não encontradas"});return;}
        let ok=0,skip=0;
        const palpitesAba={};
        rows.slice(1).forEach(cols=>{
          const jId=parseInt(cols[iId]);
          const g1=String(cols[iG1]||"").trim();
          const g2=String(cols[iG2]||"").trim();
          if(isNaN(jId)||g1===""||g2===""){skip++;return;}
          const jogo=todos.find(j=>j.id===jId);
          if(!jogo){skip++;return;}
          palpitesAba[jId]={gols1:parseInt(g1)||0,gols2:parseInt(g2)||0,bloqueado:true};
          ok++;
        });
        resultados.push({nome:nomeAba,ok,skip,erro:null,palpites:palpitesAba});
      });
      window._importacaoTemp=resultados;
      if(preview) preview.innerHTML=`
        <h4 style="font-size:14px;font-weight:500;margin:0 0 10px">Preview — ${resultados.length} participante(s):</h4>
        <div style="max-height:300px;overflow-y:auto;margin-bottom:12px">
          ${resultados.map(r=>`
            <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:${r.erro?'#fef2f2':'#f0fdf4'};margin-bottom:4px;font-size:13px">
              ${avHtml(r.nome,28,11)}
              <div style="flex:1">
                <div style="font-weight:500">${r.nome}</div>
                <div style="font-size:11px;color:#555">${r.erro?'⚠️ '+r.erro:r.ok+' palpites · '+r.skip+' ignorados'}</div>
              </div>
              <span>${r.erro?'❌':'✅'}</span>
            </div>`).join("")}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-p" onclick="confirmarImportacaoMassa()" style="padding:8px 20px">
            ✅ Confirmar (${resultados.filter(r=>!r.erro).length} participantes)
          </button>
          <button class="btn-s" onclick="cancelarImportacao()" style="padding:8px 16px">Cancelar</button>
        </div>`;
      if(msg) msg.innerHTML='<span style="color:#1a5c2e;font-weight:500">✅ Arquivo lido! Confira o preview e confirme.</span>';
    }catch(err){
      if(msg) msg.innerHTML=`<span style="color:#dc2626">⚠️ Erro: ${err.message}</span>`;
    }
  };
  reader.readAsArrayBuffer(file);
};

window.excluirUsuario=async(uid,nome)=>{
  if(!confirm(`Excluir "${nome}"? Os palpites dele também serão removidos.`)) return;
  const updates={};
  updates[`usuarios/${uid}`]=null;
  updates[`palpites/${uid}`]=null;
  await update(ref(db),updates);
  toast(`${nome} removido!`);
};

window.confirmarImportacaoMassa=async()=>{
  const msg=document.getElementById("import-massa-msg");
  const preview=document.getElementById("import-massa-preview");
  const resultados=window._importacaoTemp;
  if(!resultados||resultados.length===0) return;
  if(msg) msg.innerHTML='<span style="color:#555">⏳ Importando...</span>';
  try{
    const updates={};
    let usersOk=0,palpitesOk=0;
    for(const r of resultados){
      if(r.erro||!r.palpites) continue;
      const nomeUser=r.nome.toLowerCase().replace(/\s+/g,"_");
      const existente=Object.values(S.usuarios).find(u=>u.username===nomeUser);
      let uid;
      if(existente){
        uid=existente.id;
      } else {
        uid="u_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
        updates[`usuarios/${uid}`]={id:uid,nome:r.nome,username:nomeUser,senha:"copa2026",isAdmin:false};
        usersOk++;
      }
      Object.entries(r.palpites).forEach(([jId,pal])=>{
        updates[`palpites/${uid}/${jId}`]=pal;
        palpitesOk++;
      });
    }
    await update(ref(db),updates);
    if(preview) preview.innerHTML="";
    if(msg) msg.innerHTML=`<span style="color:#166534;font-weight:500">✅ ${usersOk} usuário(s) criado(s) · ${palpitesOk} palpite(s) salvos!<br>Senha padrão: <strong>copa2026</strong></span>`;
    window._importacaoTemp=null;
  }catch(err){
    if(msg) msg.innerHTML=`<span style="color:#dc2626">⚠️ Erro: ${err.message}</span>`;
  }
};

window.cancelarImportacao=()=>{
  window._importacaoTemp=null;
  const preview=document.getElementById("import-massa-preview");
  const msg=document.getElementById("import-massa-msg");
  if(preview) preview.innerHTML="";
  if(msg) msg.innerHTML="";
};

init();
</script>
